<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dungeons and Dragons Adventure</title>
    <script>
      window.__BOOT_ERRORS__ = [];
      window.addEventListener('error', function (event) {
        window.__BOOT_ERRORS__.push(String(event?.error?.message || event?.message || 'Unknown script error'));
      });
      window.addEventListener('unhandledrejection', function (event) {
        window.__BOOT_ERRORS__.push(String(event?.reason?.message || event?.reason || 'Unhandled promise rejection'));
      });
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
      body {
        background-color: #0c0a09; /* warm dark stone, less blue */
        color: #e2e8f0; /* slate-200 */
        font-family: 'EB Garamond', serif;
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Cinzel Decorative', serif;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.1.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.1.1/",
    "react/": "https://aistudiocdn.com/react@^19.1.1/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.20.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <script>
      setTimeout(function () {
        var root = document.getElementById('root');
        var hasContent = root && root.children && root.children.length > 0;
        if (!hasContent) {
          var reason = (window.__BOOT_ERRORS__ && window.__BOOT_ERRORS__[0]) || 'App failed to mount (possible runtime crash or stale cache).';
          if (root) {
            root.innerHTML =
              '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#020617;color:#fcd34d;padding:24px;font-family:ui-sans-serif,system-ui;">' +
              '<div style="max-width:760px;width:100%;background:rgba(0,0,0,.35);border:1px solid rgba(251,191,36,.35);border-radius:12px;padding:20px;">' +
              '<h1 style="font-size:22px;margin:0 0 8px 0;">The realm encountered a startup glitch.</h1>' +
              '<p style="opacity:.9;margin:0 0 10px 0;">Try a hard refresh (Cmd+Shift+R), or open the latest deployment link.</p>' +
              '<p style="font-size:12px;color:#fca5a5;word-break:break-word;margin:0 0 14px 0;">' + reason + '</p>' +
              '<button onclick="location.reload()" style="background:#b45309;color:white;border:none;padding:10px 14px;border-radius:8px;cursor:pointer;">Reload Adventure</button>' +
              '</div></div>';
          }
        }
      }, 4000);
    </script>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
